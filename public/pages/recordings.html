<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Recordings — Secure Interview</title>
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="topbar">
  <div class="topbar-logo">SecureInterview</div>
  <div class="topbar-right">
    <span id="user-chip" style="font-size:12px;color:var(--text2)"></span>
    <div class="topbar-sep"></div>
    <a href="/dashboard" class="btn btn-outline btn-sm">Dashboard</a>
    <button class="btn btn-outline btn-sm" onclick="doLogout()">Sign out</button>
  </div>
</div>
<div class="page-wrap">
  <div class="page-hdr">
    <div class="page-hdr-left">
      <h1>&#127902; Recordings Library</h1>
      <p>All recorded interview sessions for your account</p>
    </div>
    <button class="btn btn-outline btn-sm" onclick="loadRecordings()">&#8635; Refresh</button>
  </div>
  <div id="container"><div class="empty"><div class="empty-icon">&#8987;</div><p>Loading...</p></div></div>
</div>
<div id="toast-container"></div>
<script src="/js/utils.js"></script>
<script>
function fmtSize(b){if(!b)return'';if(b<1048576)return(b/1024).toFixed(0)+' KB';return(b/1048576).toFixed(1)+' MB';}
function fmtDur(s){if(!s)return'0:00';return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}

function buildCard(rec){
  var score=rec.trust_score||100;
  var scoreClass=score>=80?'trust-hi':score>=60?'trust-mid':'trust-lo';
  var date=rec.created_at?new Date(rec.created_at*1000).toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'}):'-';
  var card=document.createElement('div');card.className='rec-card';card.id='card-'+rec.id;
  var body=document.createElement('div');body.className='rec-card-body';

  var title=document.createElement('div');title.className='rec-title';title.textContent=rec.session_title||'Interview';
  body.appendChild(title);

  var meta=document.createElement('div');meta.className='rec-meta-row';
  meta.innerHTML='<span class="rec-meta-item">&#128100; <strong>'+(rec.candidate_name||'N/A')+'</strong></span>'
    +'<span class="rec-meta-sep"></span><span class="rec-meta-item">&#128197; '+date+'</span>'
    +'<span class="rec-meta-sep"></span><span class="rec-meta-item">&#9201; '+fmtDur(rec.duration_secs)+'</span>'
    +'<span class="rec-meta-sep"></span><span class="rec-meta-item '+scoreClass+'">&#127919; <strong>'+score+'%</strong> trust</span>'
    +'<span class="rec-meta-sep"></span><span class="rec-meta-item" style="color:'+(rec.flag_count>0?'var(--amber)':'var(--text3)')+'">&#9873; '+(rec.flag_count||0)+' flags</span>'
    +(rec.file_size?'<span class="pill" style="margin-left:auto">'+fmtSize(rec.file_size)+'</span>':'');
  body.appendChild(meta);

  var actions=document.createElement('div');actions.className='rec-actions';
  function btn(cls,html,cb){var b=document.createElement('button');b.className='btn btn-sm '+cls;b.innerHTML=html;b.onclick=cb;actions.appendChild(b);return b;}

  btn('btn-outline','&#9654; Preview',function(){togglePreview(rec.id);});
  btn('btn-primary','&#8595; Download',function(){dlRec(rec.id,rec.session_title,rec.candidate_name);});
  var cb=btn('btn-purple','&#8481; Compress for Email',function(){compressRec(rec.id,rec.session_title,cb);});
  if(rec.share_token){
    btn('btn-outline','&#128279; Copy Link',function(){copyLink(rec.share_token);});
    btn('btn-outline','&#128065; Share Page',function(){window.open('/share/'+rec.share_token,'_blank');});
  }
  btn('btn-danger','&#128465; Delete',function(){deleteRec(rec.id);});
  body.appendChild(actions);

  var pw=document.createElement('div');pw.className='prog-wrap';pw.id='pw-'+rec.id;
  pw.innerHTML='<div class="prog-bar"><div class="prog-fill" id="pf-'+rec.id+'" style="width:0%"></div></div><div class="prog-label" id="pl-'+rec.id+'"></div>';
  body.appendChild(pw);
  card.appendChild(body);

  var vid=document.createElement('video');vid.id='vid-'+rec.id;vid.controls=true;vid.preload='none';
  vid.className='rec-video';vid.src='/api/recordings/'+rec.id+'/stream';
  card.appendChild(vid);
  return card;
}

function togglePreview(id){
  var vid=document.getElementById('vid-'+id);
  if(vid.style.display==='block'){vid.style.display='none';vid.pause();}
  else{vid.style.display='block';vid.play();}
}

function dlRec(id,title,cand){
  var a=document.createElement('a');
  a.href='/api/recordings/'+id+'/stream';
  a.download='interview-'+(title||'session').replace(/[^a-z0-9]/gi,'-').toLowerCase()+'.webm';
  a.click();toast('Download started','green');
}

function copyLink(token){
  navigator.clipboard.writeText(location.origin+'/share/'+token)
    .then(function(){toast('Share link copied!','green',5000);});
}

async function deleteRec(id){
  if(!confirm('Permanently delete this recording?'))return;
  var res=await fetch('/api/recordings/'+id,{method:'DELETE'});
  if(res.ok){var c=document.getElementById('card-'+id);if(c)c.remove();toast('Recording deleted','amber');}
  else toast('Failed to delete','red');
}

// ── COMPRESSION FIX ──
// Problem: playbackRate=16 captures ~16x faster than real-time, so a 10min video
// becomes a ~37 second compressed file. The video content is correct but sped up.
//
// REAL FIX: Use MediaRecorder on the VIDEO element's stream directly,
// but at a lower bitrate. This captures the FULL duration at real speed.
// For email size: target ~15MB for a 30min interview (8kbps video = ~3.6MB/min at 720p→480p)
//
// Approach: Fetch → create object URL → play video at 1x → record canvas at lower quality
// This is slow (real-time) but produces the FULL interview at email-able size.
// We show a "real-time recording" progress bar.

async function compressRec(id, title, btn){
  var pw=document.getElementById('pw-'+id);
  var pf=document.getElementById('pf-'+id);
  var pl=document.getElementById('pl-'+id);
  btn.disabled=true; btn.textContent='Starting...';
  pw.style.display='block'; pf.style.width='2%';
  pl.textContent='Fetching recording (this may take a moment for large files)...';

  try {
    // Fetch original
    var resp=await fetch('/api/recordings/'+id+'/stream');
    if(!resp.ok) throw new Error('Could not fetch recording');
    var origBlob=await resp.blob();
    var origSize=origBlob.size;
    pf.style.width='8%';
    pl.textContent='Loaded '+fmtSize(origSize)+'. Setting up compression at email-friendly quality...';

    var srcUrl=URL.createObjectURL(origBlob);
    var src=document.createElement('video');
    src.src=srcUrl; src.muted=true; src.playsInline=true;
    src.style.cssText='position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;';
    document.body.appendChild(src);

    // Wait for enough metadata to start
    await new Promise(function(res,rej){
      src.onloadeddata=res;
      src.onerror=function(){rej(new Error('Could not load video for compression'));};
      src.load();
    });

    // Dimensions: reduce to 640x360 (360p) for email — ~5-8MB per 30 min at low bitrate
    var W=640, H=360;
    // Use actual video dimensions if smaller
    if(src.videoWidth && src.videoWidth < W){ W=src.videoWidth; H=src.videoHeight; }

    pf.style.width='12%';

    // Know the duration?
    var knownDuration=src.duration&&isFinite(src.duration)?src.duration:null;
    if(knownDuration) pl.textContent='Duration: '+fmtDur(Math.round(knownDuration))+'. Compressing at real speed for full interview...';
    else pl.textContent='Compressing at real-time speed (full interview will be captured)...';

    var canvas=document.createElement('canvas');
    canvas.width=W; canvas.height=H;
    var ctx=canvas.getContext('2d');

    // Use VP8 at low bitrate — targets ~4Mbps → ~30MB/hr → ~15MB per 30min interview
    // For 20min interview that's ~10MB — easily emailable
    var mime=MediaRecorder.isTypeSupported('video/webm;codecs=vp8')?'video/webm;codecs=vp8':'video/webm';
    var targetBitrate=400000; // 400kbps — good quality at 360p, ~3MB/min

    var csStream=canvas.captureStream(24); // 24fps output
    var recorder=new MediaRecorder(csStream,{mimeType:mime,videoBitsPerSecond:targetBitrate});
    var chunks=[];
    recorder.ondataavailable=function(e){if(e.data.size>0)chunks.push(e.data);};
    recorder.start(500);

    // Draw frames in rAF loop while video plays at NORMAL speed (1x)
    src.playbackRate=1;
    var drawing=true;
    var t0=Date.now();

    function rafDraw(){
      if(!drawing)return;
      if(!src.paused&&!src.ended) ctx.drawImage(src,0,0,W,H);
      if(knownDuration){
        var elapsed=(Date.now()-t0)/1000;
        var pct=Math.min(12+Math.round((elapsed/knownDuration)*83),95);
        pf.style.width=pct+'%';
        var remaining=Math.round(knownDuration-elapsed);
        pl.textContent='Compressing: '+fmtDur(Math.round(elapsed))+' / '+fmtDur(Math.round(knownDuration))+(remaining>0?' — '+fmtDur(remaining)+' remaining':'');
      } else {
        var elapsed=(Date.now()-t0)/1000;
        pl.textContent='Compressing: '+fmtDur(Math.round(elapsed))+' processed...';
      }
      requestAnimationFrame(rafDraw);
    }
    requestAnimationFrame(rafDraw);
    src.play();

    // Wait for video to finish
    await new Promise(function(resolve,reject){
      src.onended=resolve;
      src.onerror=reject;
      // Timeout: 3x the expected duration (real-time + buffer)
      var maxWait=knownDuration?(knownDuration*1000*1.5)+5000:3600000;
      setTimeout(resolve, maxWait);
    });

    drawing=false;
    // Draw final frame
    ctx.drawImage(src,0,0,W,H);
    await new Promise(function(resolve){setTimeout(resolve,500);});

    await new Promise(function(resolve){recorder.onstop=resolve;recorder.stop();});

    var compBlob=new Blob(chunks,{type:'video/webm'});
    var saved=Math.round((1-compBlob.size/origSize)*100);
    pf.style.width='100%';
    pl.innerHTML='<strong>Done!</strong> '+fmtSize(origSize)+' → <strong>'+fmtSize(compBlob.size)+'</strong>'+(saved>0?' ('+saved+'% smaller)':'')+' — Full interview captured at 360p';

    var url=URL.createObjectURL(compBlob);
    var a=document.createElement('a');
    a.href=url;
    a.download='email-'+(title||'interview').replace(/[^a-z0-9]/gi,'-').toLowerCase()+'-360p.webm';
    a.click();
    URL.revokeObjectURL(url);
    URL.revokeObjectURL(srcUrl);
    document.body.removeChild(src);

    var msg='Compressed download started!';
    if(compBlob.size<20*1024*1024) msg+=' '+fmtSize(compBlob.size)+' — should be emailable.';
    else msg+=' '+fmtSize(compBlob.size)+' — may need a file share service (Google Drive, Dropbox).';
    toast(msg,'green',6000);

  } catch(e) {
    pl.textContent='Error: '+e.message;
    toast('Compression failed: '+e.message,'red');
  }
  btn.disabled=false; btn.innerHTML='&#8481; Compress for Email';
}

async function loadRecordings(){
  var recs=await get('/api/recordings');
  var c=document.getElementById('container');c.innerHTML='';
  if(!recs||!recs.length){
    c.innerHTML='<div style="text-align:center;padding:80px 24px"><div style="font-size:52px;margin-bottom:16px;opacity:.3">&#127902;</div>'
      +'<h3 style="font-size:16px;font-weight:700;color:var(--text2);margin-bottom:8px">No recordings yet</h3>'
      +'<p style="color:var(--text3);font-size:13px">Go to a session and click Record. Recordings auto-save here.</p>'
      +'<a href="/dashboard" class="btn btn-primary" style="display:inline-flex;margin-top:20px">Go to Dashboard</a>'
      +'</div>';
    return;
  }
  var grid=document.createElement('div');grid.className='rec-grid';
  recs.forEach(function(rec){grid.appendChild(buildCard(rec));});
  c.appendChild(grid);
}

async function doLogout(){await post('/api/auth/logout');window.location.href='/';}

async function init(){
  var me=await requireLogin('/');if(!me)return;
  $('user-chip').textContent=me.name+' ('+(me.orgCode||'')+')';
  await loadRecordings();
}
init();
</script>
</body>
</html>
