<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Session - Secure Interview</title>
<link rel="stylesheet" href="/css/main.css">
<style>
body{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.rec-dot{width:8px;height:8px;border-radius:50%;background:var(--red);display:inline-block;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* FLAG COUNT CARDS - one per flag type, count updates live */
.flag-count-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);
  padding:10px 12px;font-size:12px;transition:all .2s;position:relative;overflow:hidden;
}
.flag-count-card:hover{border-color:var(--border2);}
.flag-count-card.high{border-left:3px solid var(--red);}
.flag-count-card.medium{border-left:3px solid var(--amber);}
.flag-count-card.low{border-left:3px solid var(--blue2);}
.flag-count-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.flag-count-title{font-weight:700;font-size:12px;flex:1;}
.flag-count-badge{
  background:var(--red3);color:var(--red);border:1px solid var(--red);
  border-radius:20px;padding:2px 8px;font-size:11px;font-weight:800;
  min-width:24px;text-align:center;transition:transform .15s;
}
.flag-count-badge.bump{transform:scale(1.3);}
.flag-count-badge.medium-badge{background:var(--amber3);color:var(--amber);border-color:var(--amber);}
.flag-count-badge.low-badge{background:var(--blue3);color:var(--blue2);border-color:var(--blue);}
.flag-count-detail{color:var(--text2);font-size:11px;margin-bottom:4px;line-height:1.4;}
.flag-count-time{font-size:10px;color:var(--text3);display:flex;align-items:center;gap:5px;}
.flag-count-last{color:var(--text3);font-size:10px;}
.flag-count-card.new-hit{animation:flagBump .4s ease;}
@keyframes flagBump{0%{background:var(--red3)}100%{background:var(--bg2)}}
.flag-count-card.medium.new-hit{animation:flagBumpAmber .4s ease;}
@keyframes flagBumpAmber{0%{background:var(--amber3)}100%{background:var(--bg2)}}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-logo">SecureInterview</div>
  <div class="topbar-right">
    <span id="s-code" class="pill"></span>
    <span id="rec-ind" style="display:none;align-items:center;gap:5px;font-size:12px;color:var(--red);font-weight:600"><span class="rec-dot"></span>REC</span>
    <button id="rec-btn" class="btn btn-danger btn-sm" onclick="toggleRec()">Record</button>
    <button id="share-screen-btn" class="btn btn-purple btn-sm" onclick="toggleScreenShare()">Share Screen</button>
    <button class="btn btn-outline btn-sm" onclick="toggleDevicePanel()" title="Camera and microphone settings">Settings</button>
    <div class="topbar-sep"></div>
    <span id="s-status" class="badge badge-default">Waiting...</span>
  </div>
</div>

<div class="session-layout">
  <div class="video-pane" id="video-pane" style="position:relative">
    <video id="remote-vid" autoplay playsinline></video>
    <div class="pip"><video id="local-vid" autoplay playsinline muted></video></div>
    <div class="video-overlay-tl">
      <span id="timer-chip" class="video-chip" style="display:none">00:00</span>
    </div>

    <!-- Device Settings Panel -->
    <div id="device-settings-panel" style="display:none;position:absolute;top:60px;right:12px;background:#0f1319;border:1px solid #1e2a3a;border-radius:10px;padding:18px;width:300px;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,.8)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div style="font-size:12px;font-weight:700;color:#94a3b8;letter-spacing:1px;text-transform:uppercase">Device Settings</div>
        <button onclick="toggleDevicePanel()" style="background:none;border:none;color:#94a3b8;cursor:pointer;font-size:16px;line-height:1;padding:2px">X</button>
      </div>
      <div style="margin-bottom:12px">
        <div style="font-size:12px;font-weight:600;color:#64748b;margin-bottom:5px">Camera</div>
        <select id="int-sel-camera" style="width:100%;padding:7px 10px;background:#161b22;border:1px solid #1e2a3a;border-radius:6px;color:#e2e8f0;font-size:13px;outline:none;cursor:pointer;font-family:inherit" onchange="applyInterviewerDevices()"></select>
      </div>
      <div style="margin-bottom:12px">
        <div style="font-size:12px;font-weight:600;color:#64748b;margin-bottom:5px">Microphone</div>
        <select id="int-sel-mic" style="width:100%;padding:7px 10px;background:#161b22;border:1px solid #1e2a3a;border-radius:6px;color:#e2e8f0;font-size:13px;outline:none;cursor:pointer;font-family:inherit" onchange="applyInterviewerDevices()"></select>
      </div>
      <div>
        <div style="font-size:12px;font-weight:600;color:#64748b;margin-bottom:5px">Speaker</div>
        <select id="int-sel-speaker" style="width:100%;padding:7px 10px;background:#161b22;border:1px solid #1e2a3a;border-radius:6px;color:#e2e8f0;font-size:13px;outline:none;cursor:pointer;font-family:inherit" onchange="applyInterviewerSpeaker()"></select>
      </div>
      <div style="font-size:11px;color:#374151;margin-top:12px;text-align:center">Changes apply immediately</div>
    </div>

    <div id="screenshare-bar" class="screen-share-bar" style="display:none">
      Sharing your screen - candidate can see it
      <button onclick="stopScreenShare()" style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;padding:2px 10px;border-radius:4px;cursor:pointer;font-size:12px;margin-left:8px">Stop</button>
    </div>
  </div>

  <div class="sidebar">
    <div class="sb-head">
      <div class="sb-title" id="s-title">Loading...</div>
      <div class="sb-meta" id="s-cand"></div>
    </div>
    <div class="trust-box">
      <div class="trust-label">Trust Score</div>
      <div class="trust-num trust-hi" id="trust-num">100</div>
      <div class="trust-sub trust-hi" id="trust-sub">Excellent</div>
      <div class="trust-bar"><div class="trust-bar-fill" id="trust-bar-fill" style="width:100%;background:var(--green)"></div></div>
    </div>
    <div class="sb-tabs">
      <button class="sb-tab active" id="tab-f-btn" onclick="switchTab('flags',this)">Flags <span id="flag-total-badge"></span></button>
      <button class="sb-tab" onclick="switchTab('questions',this)">Questions</button>
    </div>
    <!-- FLAGS PANEL: one card per flag TYPE, count updates live -->
    <div id="sbp-flags" class="sb-panel active">
      <div class="no-items" id="no-flags-msg"><div class="no-items-icon">OK</div>No flags yet.</div>
    </div>
    <div id="sbp-questions" class="sb-panel"></div>
    <div id="q-nav" style="display:none" class="q-nav">
      <button class="btn btn-outline btn-sm" onclick="prevQ()" style="flex:1">Prev</button>
      <button class="btn btn-primary btn-sm" onclick="nextQ()" style="flex:1">Next</button>
    </div>
    <div class="sb-foot">
      <button class="btn btn-danger btn-sm" onclick="endSession()" style="flex:1">End Session</button>
      <button class="btn btn-outline btn-sm" onclick="copyInvite()">Copy Invite</button>
      <a href="/recordings" class="btn btn-outline btn-sm">Recordings</a>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/utils.js"></script>
<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<script>
var sessionId = location.pathname.split('/').pop();
var socket, pc, localStream, screenStream, sessionData, qIdx = 0;
var mediaRecorder = null, recChunks = [], isRec = false, recStart = null;
var isScreenSharing = false, timerInterval = null;
var remoteStream = null, audioCtxRec = null;

// ── FLAG COUNT SYSTEM ──
// One card per flag TYPE. Count increments live. No spam.
// flagRegistry: { [flagKey]: { text, detail, severity, count, lastTime, cardEl } }
var flagRegistry = {};
var totalFlagCount = 0;

function getFlagKey(text){
  // Normalize to a stable key per flag type
  return text.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'').slice(0,40);
}

function getSeverityBadgeClass(severity){
  if(severity==='high') return '';
  if(severity==='medium') return 'medium-badge';
  return 'low-badge';
}

function addOrUpdateFlag(flag){
  totalFlagCount++;
  var key = getFlagKey(flag.text);
  var panel = $('sbp-flags');
  var noMsg = $('no-flags-msg');

  if(flagRegistry[key]){
    // UPDATE existing card
    var entry = flagRegistry[key];
    entry.count++;
    entry.lastTime = flag.time_offset || flag.time || '--:--';
    if(flag.detail && flag.detail.length > (entry.detail||'').length) entry.detail = flag.detail;

    var card = entry.cardEl;
    var badge = card.querySelector('.flag-count-badge');
    var det = card.querySelector('.flag-count-detail');
    var lastEl = card.querySelector('.flag-count-last');

    badge.textContent = 'x' + entry.count;
    if(det && entry.detail) det.textContent = entry.detail;
    if(lastEl) lastEl.textContent = 'Last: ' + entry.lastTime;

    // Visual bump animation
    badge.classList.remove('bump');
    void badge.offsetWidth;
    badge.classList.add('bump');
    setTimeout(function(){ badge.classList.remove('bump'); }, 300);

    card.classList.remove('new-hit');
    void card.offsetWidth;
    card.classList.add('new-hit');
    setTimeout(function(){ card.classList.remove('new-hit'); }, 500);

    // Move to top if multiple hits
    if(entry.count > 1 && panel.firstChild !== card){
      panel.insertBefore(card, panel.firstChild);
    }
  } else {
    // CREATE new card for this flag type
    var entry = {
      text: flag.text,
      detail: flag.detail || '',
      severity: flag.severity || 'medium',
      count: 1,
      lastTime: flag.time_offset || flag.time || '--:--',
      cardEl: null
    };
    flagRegistry[key] = entry;

    if(noMsg) noMsg.style.display = 'none';

    var card = document.createElement('div');
    card.className = 'flag-count-card ' + entry.severity + ' new-hit';
    card.id = 'flag-card-' + key;

    var hdr = document.createElement('div');
    hdr.className = 'flag-count-header';

    var title = document.createElement('div');
    title.className = 'flag-count-title';
    title.textContent = flag.text;

    var badge = document.createElement('div');
    badge.className = 'flag-count-badge ' + getSeverityBadgeClass(entry.severity);
    badge.textContent = 'x1';

    hdr.appendChild(title);
    hdr.appendChild(badge);
    card.appendChild(hdr);

    if(flag.detail){
      var det = document.createElement('div');
      det.className = 'flag-count-detail';
      det.textContent = flag.detail;
      card.appendChild(det);
    }

    var timeRow = document.createElement('div');
    timeRow.className = 'flag-count-time';
    var sevSpan = document.createElement('span');
    sevSpan.className = 'flag-count';
    sevSpan.textContent = entry.severity.toUpperCase();
    var lastSpan = document.createElement('span');
    lastSpan.className = 'flag-count-last';
    lastSpan.textContent = 'Last: ' + entry.lastTime;
    timeRow.appendChild(sevSpan);
    timeRow.appendChild(lastSpan);
    card.appendChild(timeRow);

    setTimeout(function(){ card.classList.remove('new-hit'); }, 500);

    entry.cardEl = card;
    // Insert at top
    if(panel.firstChild && panel.firstChild !== noMsg){
      panel.insertBefore(card, panel.firstChild);
    } else {
      panel.appendChild(card);
    }
  }

  // Update total badge in tab
  var totalBadge = $('flag-total-badge');
  totalBadge.textContent = ' (' + totalFlagCount + ')';
  totalBadge.style.color = 'var(--red)';
  totalBadge.style.fontWeight = '700';

  // Scroll to top of flags
  panel.scrollTop = 0;
}

function switchTab(name, btn){
  document.querySelectorAll('.sb-tab').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.sb-panel').forEach(function(p){p.classList.remove('active');});
  btn.classList.add('active');
  document.getElementById('sbp-'+name).classList.add('active');
}

function setTrust(v){
  var cls=trustClass(v),lbl=trustLabel(v);
  var n=$('trust-num'),s=$('trust-sub'),bar=$('trust-bar-fill');
  n.textContent=v; n.className='trust-num '+cls; s.className='trust-sub '+cls; s.textContent=lbl;
  bar.style.width=v+'%'; bar.style.background=v>=80?'var(--green)':v>=60?'var(--amber)':'var(--red)';
}

function renderQuestions(qs){
  var el=$('sbp-questions'); el.innerHTML='';
  if(!qs||!qs.length){el.innerHTML='<div class="no-items">No questions added.</div>';return;}
  $('q-nav').style.display='flex';
  qs.forEach(function(q,i){
    var div=document.createElement('div'); div.className='q-card'+(i===qIdx?' active':'');
    var num=document.createElement('div'); num.className='q-num'; num.textContent='Q'+(i+1);
    var txt=document.createElement('div'); txt.textContent=q;
    div.appendChild(num); div.appendChild(txt); div.onclick=function(){goQ(i);}; el.appendChild(div);
  });
}

function goQ(i){qIdx=i;renderQuestions(sessionData&&sessionData.questions||[]);if(socket)socket.emit('next-question',{sessionId:sessionId,qIdx:qIdx});}
function nextQ(){if(sessionData&&sessionData.questions&&qIdx<sessionData.questions.length-1)goQ(qIdx+1);}
function prevQ(){if(qIdx>0)goQ(qIdx-1);}

function startTimer(){
  var t0=Date.now(); $('timer-chip').style.display='flex';
  timerInterval=setInterval(function(){
    var s=Math.floor((Date.now()-t0)/1000);
    $('timer-chip').textContent=String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
  },1000);
}

function toggleRec(){if(isRec)stopRec();else startRec();}

function startRec(){
  var vid=$('remote-vid');
  if(!vid.srcObject && !remoteStream){toast('No candidate video yet','red');return;}
  var canvas=document.createElement('canvas'); canvas.width=1280; canvas.height=720;
  var ctx=canvas.getContext('2d'); isRec=true; recStart=Date.now();
  (function draw(){
    if(!isRec)return;
    ctx.drawImage(vid,0,0,1280,720);
    var lv=$('local-vid'); if(lv.srcObject) ctx.drawImage(lv,1060,590,210,120);
    ctx.fillStyle='rgba(239,68,68,.9)'; ctx.fillRect(10,10,58,26);
    ctx.fillStyle='#fff'; ctx.font='bold 13px Arial'; ctx.fillText('REC',18,28);
    requestAnimationFrame(draw);
  })();
  var cs=canvas.captureStream(30);
  try{
    audioCtxRec=new (window.AudioContext||window.webkitAudioContext)();
    var dest=audioCtxRec.createMediaStreamDestination();
    if(localStream&&localStream.getAudioTracks().length>0){
      audioCtxRec.createMediaStreamSource(localStream).connect(dest);
    }
    var remSrc = remoteStream&&remoteStream.getAudioTracks().length>0 ? remoteStream :
                 (vid.srcObject&&vid.srcObject.getAudioTracks&&vid.srcObject.getAudioTracks().length>0?vid.srcObject:null);
    if(remSrc) audioCtxRec.createMediaStreamSource(remSrc).connect(dest);
    dest.stream.getAudioTracks().forEach(function(t){cs.addTrack(t);});
  }catch(e){
    if(localStream) localStream.getAudioTracks().forEach(function(t){cs.addTrack(t);});
  }
  var mime=MediaRecorder.isTypeSupported('video/webm;codecs=vp9,opus')?'video/webm;codecs=vp9,opus':
           MediaRecorder.isTypeSupported('video/webm;codecs=vp8,opus')?'video/webm;codecs=vp8,opus':'video/webm';
  mediaRecorder=new MediaRecorder(cs,{mimeType:mime});
  recChunks=[]; mediaRecorder.ondataavailable=function(e){if(e.data.size>0)recChunks.push(e.data);};
  mediaRecorder.start(1000);
  $('rec-btn').textContent='Stop & Save'; $('rec-btn').className='btn btn-outline btn-sm';
  $('rec-ind').style.display='flex';
  toast('Recording started','green');
}

function stopRec(){
  if(!mediaRecorder)return; isRec=false;
  var dur=Math.floor((Date.now()-recStart)/1000);
  mediaRecorder.stop();
  if(audioCtxRec){audioCtxRec.close().catch(function(){}); audioCtxRec=null;}
  mediaRecorder.onstop=function(){
    var blob=new Blob(recChunks,{type:'video/webm'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a'); a.href=url;
    a.download='interview-'+(sessionData&&sessionData.code||'session')+'-'+new Date().toISOString().slice(0,19).replace(/:/g,'-')+'.webm';
    a.click(); URL.revokeObjectURL(url);
    uploadRecording(blob,dur);
  };
  $('rec-btn').textContent='Record'; $('rec-btn').className='btn btn-danger btn-sm';
  $('rec-ind').style.display='none';
}

async function uploadRecording(blob,dur){
  toast('Saving to Recordings library...','amber');
  try{
    var fd=new FormData(); fd.append('recording',blob,'recording.webm');
    fd.append('sessionId',sessionId); fd.append('durationSecs',String(dur));
    var res=await fetch('/api/recordings/upload',{method:'POST',body:fd});
    var data=await res.json();
    if(data.ok) toast('Saved to Recordings library!','green');
    else toast('Upload failed: '+(data.error||'unknown'),'red');
  }catch(e){toast('Upload error: '+e.message,'red');}
}

async function toggleScreenShare(){if(isScreenSharing)stopScreenShare();else startScreenShare();}

async function startScreenShare(){
  try{
    screenStream=await navigator.mediaDevices.getDisplayMedia({video:{cursor:'always'},audio:false});
    var screenTrack=screenStream.getVideoTracks()[0];
    if(pc){
      var vs=pc.getSenders().find(function(s){return s.track&&s.track.kind==='video';});
      if(vs) vs.replaceTrack(screenTrack).then(function(){toast('Screen sharing started','blue',4000);}).catch(function(e){toast('Track replace failed: '+e.message,'red');});
    } else { toast('Connect to candidate first','red'); screenStream.getTracks().forEach(function(t){t.stop();}); screenStream=null; return; }
    var prev=document.getElementById('screen-preview');
    if(!prev){prev=document.createElement('video');prev.id='screen-preview';prev.muted=true;prev.autoplay=true;prev.playsInline=true;Object.assign(prev.style,{position:'absolute',bottom:'140px',right:'16px',width:'180px',height:'101px',borderRadius:'6px',border:'2px solid rgba(139,92,246,.8)',objectFit:'cover',zIndex:'10'});document.getElementById('video-pane').appendChild(prev);}
    prev.srcObject=screenStream;
    screenTrack.onended=function(){stopScreenShare();};
    isScreenSharing=true;
    $('share-screen-btn').textContent='Stop Sharing'; $('share-screen-btn').className='btn btn-amber btn-sm';
    $('screenshare-bar').style.display='flex';
  }catch(e){if(e.name!=='AbortError') toast('Screen share failed: '+e.message,'red');}
}

function stopScreenShare(){
  if(screenStream){screenStream.getTracks().forEach(function(t){t.stop();}); screenStream=null;}
  var prev=document.getElementById('screen-preview'); if(prev){prev.srcObject=null;prev.remove();}
  if(pc&&localStream){
    var cam=localStream.getVideoTracks()[0];
    var vs=pc.getSenders().find(function(s){return s.track&&s.track.kind==='video';});
    if(vs&&cam) vs.replaceTrack(cam).catch(function(){});
  }
  isScreenSharing=false;
  $('share-screen-btn').textContent='Share Screen'; $('share-screen-btn').className='btn btn-purple btn-sm';
  $('screenshare-bar').style.display='none';
  toast('Screen sharing stopped','amber');
}

var devicePanelOpen=false;
async function toggleDevicePanel(){
  devicePanelOpen=!devicePanelOpen;
  var panel=$('device-settings-panel');
  if(devicePanelOpen){panel.style.display='block';await populateInterviewerDevices();}
  else panel.style.display='none';
}
async function populateInterviewerDevices(){
  try{
    var devs=await navigator.mediaDevices.enumerateDevices();
    function fill(selId,list,label){var sel=document.getElementById(selId);if(!sel)return;var cur=sel.value;sel.innerHTML='';list.forEach(function(d,i){var o=document.createElement('option');o.value=d.deviceId;o.textContent=d.label||(label+' '+(i+1));if(d.deviceId===cur)o.selected=true;sel.appendChild(o);});if(!list.length){var o=document.createElement('option');o.textContent='No '+label;sel.appendChild(o);}}
    fill('int-sel-camera',devs.filter(function(d){return d.kind==='videoinput';}),'Camera');
    fill('int-sel-mic',devs.filter(function(d){return d.kind==='audioinput';}),'Microphone');
    fill('int-sel-speaker',devs.filter(function(d){return d.kind==='audiooutput';}),'Speaker');
  }catch(e){}
}
async function applyInterviewerDevices(){
  var camId=document.getElementById('int-sel-camera').value;
  var micId=document.getElementById('int-sel-mic').value;
  try{
    var newStream=await navigator.mediaDevices.getUserMedia({video:camId?{deviceId:{exact:camId}}:true,audio:micId?{deviceId:{exact:micId}}:true});
    if(localStream) localStream.getTracks().forEach(function(t){t.stop();});
    localStream=newStream; $('local-vid').srcObject=localStream;
    if(pc){var snds=pc.getSenders();newStream.getTracks().forEach(function(t){var s=snds.find(function(x){return x.track&&x.track.kind===t.kind;});if(s)s.replaceTrack(t).catch(function(){});});}
    toast('Device changed','green');
  }catch(e){toast('Could not switch device: '+e.message,'red');}
}
function applyInterviewerSpeaker(){
  var spk=document.getElementById('int-sel-speaker').value; if(!spk)return;
  var rv=$('remote-vid');
  if(rv&&typeof rv.setSinkId==='function') rv.setSinkId(spk).then(function(){toast('Speaker changed','green');}).catch(function(e){toast('Speaker: '+e.message,'red');});
}

async function init(){
  var me=await requireLogin('/'); if(!me)return;
  var s=await get('/api/sessions/'+sessionId);
  if(s.error){toast(s.error,'red');return;}
  sessionData=s;
  $('s-title').textContent=s.title;
  $('s-cand').textContent='Candidate: '+(s.candidate_name||'TBD');
  $('s-code').textContent='Code: '+s.code;
  setTrust(s.trust_score!=null?s.trust_score:100);

  // Load existing flags into count system
  if(s.flags&&s.flags.length){
    s.flags.forEach(function(f){ addOrUpdateFlag(f); });
    switchTab('flags',$('tab-f-btn'));
  }
  renderQuestions(s.questions||[]);
  await startMedia(); connectSocket(); startTimer();
}

async function startMedia(){
  try{localStream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});$('local-vid').srcObject=localStream;}
  catch(e){toast('Camera/mic: '+e.message,'amber');}
}

function connectSocket(){
  socket=io();
  socket.emit('join-room',{sessionId:sessionId,role:'interviewer'});
  socket.on('peer-joined',function(data){if(data.role==='candidate'){$('s-status').textContent='Live';$('s-status').className='badge badge-green';startWebRTC(true);}});
  socket.on('peer-already-present',function(){$('s-status').textContent='Live';$('s-status').className='badge badge-green';startWebRTC(true);});
  socket.on('webrtc-offer',async function(data){if(!pc)await startWebRTC(false);await pc.setRemoteDescription(data.offer);var a=await pc.createAnswer();await pc.setLocalDescription(a);socket.emit('webrtc-answer',{sessionId:sessionId,answer:a});});
  socket.on('webrtc-answer',async function(data){if(pc)await pc.setRemoteDescription(data.answer);});
  socket.on('webrtc-ice',async function(data){if(pc)await pc.addIceCandidate(data.candidate);});
  socket.on('candidate-flag',async function(flag){
    // Update count card - no spam
    addOrUpdateFlag(flag);
    // Show a brief toast for HIGH severity only
    if(flag.severity==='high'){
      toast('HIGH: '+flag.text,'red',3000);
    }
    // Switch to flags tab automatically on first flag
    if(totalFlagCount===1){
      switchTab('flags',$('tab-f-btn'));
    }
    // Refresh trust score
    var s=await get('/api/sessions/'+sessionId);
    setTrust(s.trust_score!=null?s.trust_score:100);
  });
  socket.on('peer-left',function(){$('s-status').textContent='Disconnected';$('s-status').className='badge badge-red';toast('Candidate disconnected','amber');});
}

async function startWebRTC(isInit){
  pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]});
  if(localStream) localStream.getTracks().forEach(function(t){pc.addTrack(t,localStream);});
  pc.ontrack=function(e){remoteStream=e.streams[0];$('remote-vid').srcObject=remoteStream;};
  pc.onicecandidate=function(e){if(e.candidate)socket.emit('webrtc-ice',{sessionId:sessionId,candidate:e.candidate});};
  if(isInit){var o=await pc.createOffer();await pc.setLocalDescription(o);socket.emit('webrtc-offer',{sessionId:sessionId,offer:o});}
}

async function endSession(){
  if(!confirm('End this session?'))return;
  if(isRec) stopRec();
  if(timerInterval) clearInterval(timerInterval);
  if(socket) socket.emit('session-ended',{sessionId:sessionId});
  await patch('/api/sessions/'+sessionId,{status:'ended'});
  try{ await post('/api/recordings/session/'+sessionId+'/sync',{}); }catch(e){}
  setTimeout(function(){location.href='/dashboard';},600);
}

function copyInvite(){
  navigator.clipboard.writeText(location.origin+'/join/'+(sessionData&&sessionData.code||'')).then(function(){toast('Invite link copied!','green');});
}

init();
</script>
