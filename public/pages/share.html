<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Interview Recording — Secure Interview</title>
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<nav class="nav">
  <div class="nav-logo">SecureInterview</div>
  <div class="nav-right" style="font-size:12px;color:var(--text2)">Shared Recording</div>
</nav>
<div class="share-wrap" id="main">
  <div class="empty"><div class="empty-icon">&#8987;</div><p>Loading recording...</p></div>
</div>
<script>
var token=location.pathname.split('/').pop();
function fmtDate(ts){if(!ts)return'-';return new Date(ts*1000).toLocaleString('en-US',{month:'long',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'});}
function fmtDur(s){if(!s)return'0:00';return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}

async function init(){
  var res=await fetch('/api/recordings/share/'+token+'/info');
  var rec=res.ok?await res.json():null;
  var main=document.getElementById('main');
  if(!rec||rec.error){
    main.innerHTML='<div style="text-align:center;padding:80px 24px"><div style="font-size:52px;margin-bottom:20px;opacity:.3">&#128249;</div><h2 style="font-size:20px;margin-bottom:8px">Recording not found</h2><p style="color:#64748b">This link may have expired or been deleted.</p></div>';
    return;
  }
  var score=rec.trust_score||100;
  var scoreColor=score>=80?'#22c55e':score>=60?'#f59e0b':'#ef4444';
  var scoreLabel=score>=80?'Excellent':score>=60?'Good':score>=40?'Caution':'High Risk';
  main.innerHTML='<div class="share-header">'
    +'<div class="share-title">'+rec.session_title+'</div>'
    +'<div class="share-meta-row">'
    +'<span>&#128100; Candidate: <strong>'+(rec.candidate_name||'N/A')+'</strong></span>'
    +'<span>&#128197; '+fmtDate(rec.created_at)+'</span>'
    +'<span>&#9201; Duration: '+fmtDur(rec.duration_secs)+'</span>'
    +'</div>'
    +'<video class="share-video" controls preload="metadata" src="/api/recordings/share/'+token+'/stream"></video>'
    +'<div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap">'
    +'<a href="/api/recordings/share/'+token+'/stream" download="interview-'+rec.session_title.replace(/[^a-z0-9]/gi,'-').toLowerCase()+'.webm" style="display:inline-flex;align-items:center;gap:6px;padding:9px 18px;background:#3b82f6;color:#fff;border-radius:7px;font-size:13px;font-weight:600;text-decoration:none">&#8595; Download Recording</a>'
    +'</div>'
    +'<div class="share-stats">'
    +'<div class="share-stat"><div class="share-stat-val" style="color:'+scoreColor+'">'+score+'%</div><div class="share-stat-label">Trust Score</div><div style="font-size:11px;color:'+scoreColor+';margin-top:2px">'+scoreLabel+'</div></div>'
    +'<div class="share-stat"><div class="share-stat-val" style="color:'+(rec.flag_count>0?'#f59e0b':'#22c55e')+'">'+(rec.flag_count||0)+'</div><div class="share-stat-label">Integrity Flags</div></div>'
    +'<div class="share-stat"><div class="share-stat-val">'+fmtDur(rec.duration_secs)+'</div><div class="share-stat-label">Duration</div></div>'
    +'</div>'
    +'</div>';
}
init();
</script>
</body>
</html>
