# fly.toml app configuration file generated for luca-proctor-fly-v1 on 2026-06-19T17:47:32Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'luca-proctor-fly-v1'
primary_region = 'iad'

[build]

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
